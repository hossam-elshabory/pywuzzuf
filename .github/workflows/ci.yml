name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup

      - name: Run Ruff
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: Run Ty
        run: uv run ty check

      - name: Validate Commit Messages
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            uv run cz check --rev-range origin/${{ github.base_ref }}..HEAD
          else
            if git rev-parse --quiet --verify ${{ github.event.before }}^{commit} >/dev/null 2>&1; then
              uv run cz check --rev-range ${{ github.event.before }}..${{ github.event.after }}
            else
              echo "Warning: Invalid 'before' SHA. Falling back to checking the latest commit message."
              uv run cz check --message "$(git log -1 --format=%B)"
            fi
          fi

  test:
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run tests
        run: uv run pytest tests/unit tests/integration -v --cov=pywuzzuf --cov-report=term-missing

  dependency-review:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Dependency review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          comment-summary-in-pr: always
